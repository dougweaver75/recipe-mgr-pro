<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Header -->
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-title">Recipe Manager Pro</h1>
            <div class="header-actions">
                <button id="searchBtn" class="icon-btn" aria-label="Search">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">
                    <svg id="sunIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moonIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Search Overlay -->
        <div id="searchOverlay" class="search-overlay">
            <div class="search-header">
                <button id="searchBackBtn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search recipes..." autofocus>
                <button id="searchClearBtn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Home View - Category Grid -->
        <section id="homeView" class="view active">
            <div class="container">
                <h2 class="view-title">Categories</h2>
                <div id="categoryGrid" class="category-grid">
                    <!-- Categories will be populated by JS -->
                </div>
            </div>
        </section>

        <!-- Recipes View - Full List -->
        <section id="recipesView" class="view">
            <div class="container">
                <div class="recipes-header">
                    <h2 class="view-title">All Recipes</h2>
                    <div class="filter-controls">
                        <select id="courseFilter" class="form-control">
                            <option value="">All Courses</option>
                        </select>
                        <select id="categoryFilter" class="form-control">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="recipe-count">
                        <span id="recipeCount">0</span> recipes
                    </div>
                </div>
                <div id="recipeGrid" class="recipe-list">
                    <!-- Recipes will be populated by JS -->
                </div>
            </div>
        </section>

        <!-- Add Recipe View -->
        <section id="addView" class="view">
            <div class="container">
                <div class="add-tabs">
                    <button class="add-tab-btn active" data-add-tab="url">From URL</button>
                    <button class="add-tab-btn" data-add-tab="file">From File</button>
                    <button class="add-tab-btn" data-add-tab="manual">Manual Entry</button>
                </div>

                <!-- From URL -->
                <div id="urlTab" class="add-tab-content active">
                    <div class="form-group">
                        <label for="recipeUrl">Recipe URL</label>
                        <input type="url" id="recipeUrl" class="form-control" placeholder="https://example.com/recipe">
                        <button id="scrapeUrl" class="btn btn-primary">Import Recipe</button>
                        <div id="urlStatus" class="status-message"></div>
                    </div>
                </div>

                <!-- From File -->
                <div id="fileTab" class="add-tab-content">
                    <div class="form-group">
                        <label>Import from JSON file</label>
                        <div id="fileUploadArea" class="file-upload-area">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p>Click to upload or drag and drop</p>
                            <small>JSON files only</small>
                        </div>
                        <input type="file" id="fileInput" accept=".json" style="display: none;">
                    </div>
                </div>

                <!-- Manual Entry -->
                <div id="manualTab" class="add-tab-content">
                    <form id="manualRecipeForm" class="recipe-form">
                        <div class="form-group">
                            <label for="manualTitle">Recipe Title *</label>
                            <input type="text" id="manualTitle" class="form-control" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="manualCourse">Course *</label>
                                <select id="manualCourse" class="form-control" required>
                                    <option value="">Select Course</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="manualCategory">Category *</label>
                                <select id="manualCategory" class="form-control" required>
                                    <option value="">Select Category</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="manualServings">Servings</label>
                                <input type="number" id="manualServings" class="form-control" value="4" min="1">
                            </div>
                            <div class="form-group">
                                <label for="manualPrepTime">Prep Time (minutes)</label>
                                <input type="number" id="manualPrepTime" class="form-control" min="0">
                            </div>
                            <div class="form-group">
                                <label for="manualCookTime">Cook Time (minutes)</label>
                                <input type="number" id="manualCookTime" class="form-control" min="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Ingredients *</label>
                            <div id="ingredientsList"></div>
                            <button type="button" id="addIngredient" class="btn btn-secondary">+ Add Ingredient</button>
                        </div>
                        <div class="form-group">
                            <label>Instructions *</label>
                            <div id="instructionsList"></div>
                            <button type="button" id="addInstruction" class="btn btn-secondary">+ Add Step</button>
                        </div>
                        <div class="form-group">
                            <label for="manualNotes">Notes</label>
                            <textarea id="manualNotes" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Recipe</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <button class="modal-back" id="modalBackBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            
            <div class="modal-header-section">
                <h2 id="modalRecipeTitle" class="modal-title"></h2>
                <div class="modal-actions">
                    <button id="editRecipeBtn" class="icon-btn" title="Edit">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                    <button id="deleteRecipeBtn" class="icon-btn" title="Delete">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="recipe-detail-content">
                <!-- Left side: Meta info -->
                <div class="recipe-meta">
                    <div class="meta-item">
                        <span class="meta-label">⏱️ Prep</span>
                        <span id="modalRecipePrepTime" class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">🔥 Cook</span>
                        <span id="modalRecipeCookTime" class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">🍽️ Course</span>
                        <span id="modalRecipeCourse" class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">📁 Category</span>
                        <span id="modalRecipeCategory" class="meta-value"></span>
                    </div>
                    
                    <div class="servings-control">
                        <label>Servings</label>
                        <div class="servings-adjuster">
                            <button id="decreaseServings" class="serving-btn">−</button>
                            <input type="number" id="currentServings" class="serving-input" value="4" min="1">
                            <button id="increaseServings" class="serving-btn">+</button>
                        </div>
                        <small>Original: <span id="originalServings"></span></small>
                    </div>

                    <div id="modalSourceSection" class="meta-source" style="display: none;">
                        <span class="meta-label">🔗 Source</span>
                        <a id="modalRecipeSource" class="meta-link" href="#" target="_blank"></a>
                    </div>
                </div>

                <!-- Right side: Image -->
                <div class="recipe-image-container">
                    <img id="modalRecipeImage" class="recipe-detail-image" alt="Recipe">
                </div>
            </div>

            <div class="recipe-sections">
                <section class="recipe-section">
                    <h3 class="section-title">Ingredients</h3>
                    <ul id="modalRecipeIngredients" class="ingredients-list"></ul>
                </section>

                <section class="recipe-section">
                    <h3 class="section-title">Instructions</h3>
                    <ol id="modalRecipeInstructions" class="instructions-list"></ol>
                </section>

                <section id="modalNotesSection" class="recipe-section" style="display: none;">
                    <h3 class="section-title">Notes</h3>
                    <p id="modalRecipeNotes" class="recipe-notes"></p>
                </section>
            </div>
        </div>
    </div>

    <!-- Edit Recipe Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Recipe</h2>
                <button class="modal-close" data-modal="editModal">×</button>
            </div>
            <form id="editRecipeForm" class="recipe-form">
                <div class="form-group">
                    <label for="editRecipeTitle">Title</label>
                    <input type="text" id="editRecipeTitle" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editRecipeCourse">Course</label>
                        <input type="text" id="editRecipeCourse" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="editRecipeCategory">Category</label>
                        <input type="text" id="editRecipeCategory" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editRecipeServings">Servings</label>
                        <input type="number" id="editRecipeServings" class="form-control" min="1">
                    </div>
                    <div class="form-group">
                        <label for="editRecipePrepTime">Prep Time</label>
                        <input type="text" id="editRecipePrepTime" class="form-control" placeholder="e.g. 15 minutes">
                    </div>
                    <div class="form-group">
                        <label for="editRecipeCookTime">Cook Time</label>
                        <input type="text" id="editRecipeCookTime" class="form-control" placeholder="e.g. 30 minutes">
                    </div>
                </div>
                <div class="form-group">
                    <label>Ingredients</label>
                    <div id="editIngredientsList"></div>
                    <button type="button" id="addEditIngredient" class="btn btn-secondary">+ Add Ingredient</button>
                </div>
                <div class="form-group">
                    <label>Instructions</label>
                    <div id="editInstructionsList"></div>
                    <button type="button" id="addEditInstruction" class="btn btn-secondary">+ Add Step</button>
                </div>
                <div class="form-group">
                    <label for="editRecipeNotes">Notes</label>
                    <textarea id="editRecipeNotes" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-modal="editModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-view="homeView">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-view="recipesView">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Recipes</span>
        </button>
        <button class="nav-item" data-view="addView">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Add</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
